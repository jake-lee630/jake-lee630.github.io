<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />

    <title>JL - Contact</title>
  </head>
  <body>
    <div id="navbar"></div>

    <div class="container">
      <div class="section">
        <p class="section-header">CONTACT</p>

        <p class="description">
          Hi! The best way to contact me is through <a href="mailto:lee.jae677@gmail.com">my email</a>
          <i class="bi bi-box-arrow-up-right"></i><br /><br />

          Feel free to connect and/or reach out through my other social links!
        </p>
      </div>

      <img class="landscape" src="./resources/images/Panda.JPEG" alt="Jake" />
    </div>

    <div id="footer"></div>

    <script>
      fetch("./navbar.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("navbar").innerHTML = html;

          const current = window.location.pathname.split("/").pop();
          document.querySelectorAll(".nav-bar a").forEach((link) => {
            if (link.getAttribute("href") === `./${current}`) {
              link.classList.add("active");
            }
          });
        });
      fetch("./footer.html")
        .then((res) => res.text())
        .then((html) => (document.getElementById("footer").innerHTML = html));
    </script>
  </body>
</html>
